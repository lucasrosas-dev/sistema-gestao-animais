{% extends "base.html" %}
{% block title %}{{ error_title }}{% endblock %}
{% block content %}
<section class="card error-page">
  <div class="error-code">{{ status_code_value }}</div>
  <h1>{{ error_title }}</h1>
  <p>{{ error_message }}</p>
  <div class="actions"><a class="button" href="/painel">Voltar ao painel</a><button class="button ghost" type="button" onclick="history.back()">Voltar</button></div>
</section>
{% endblock %}
